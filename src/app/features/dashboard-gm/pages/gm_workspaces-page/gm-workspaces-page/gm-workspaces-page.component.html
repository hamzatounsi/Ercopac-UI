<div class="workspace-page">
  <section class="workspace-header">
    <div class="header-text">
      <p class="eyebrow">ERCOPAC Monitoring Platform</p>
      <h1>Select your workspace</h1>
      <p class="subtitle">
        Access project monitoring, department follow-up and executive visibility
        from one unified platform.
      </p>
    </div>
  </section>

  <section class="workspace-grid">
    <button class="workspace-card primary-card" type="button" (click)="openProjectum()">
      <div class="app-icon projectum-icon">
        <span class="material-symbols-outlined">folder_managed</span>
      </div>

      <div class="card-body">
        <h3>Projectum</h3>
        <p>Project portfolio, planning and project supervision workspace.</p>
      </div>

      <div class="card-footer available">
        <span class="material-symbols-outlined">arrow_forward</span>
        <span>Open</span>
      </div>
    </button>

    <button class="workspace-card" type="button" disabled>
      <div class="app-icon department-icon">
        <span class="material-symbols-outlined">apartment</span>
      </div>

      <div class="card-body">
        <h3>My Department</h3>
        <p>Department-level visibility, coordination and operational follow-up.</p>
      </div>

      <div class="card-footer muted">
        <span class="material-symbols-outlined">schedule</span>
        <span>Coming soon</span>
      </div>
    </button>

    <button class="workspace-card" type="button" disabled>
      <div class="app-icon company-icon">
        <span class="material-symbols-outlined">monitoring</span>
      </div>

      <div class="card-body">
        <h3>Company Dashboard</h3>
        <p>Executive KPIs, company-wide indicators and strategic visibility.</p>
      </div>

      <div class="card-footer muted">
        <span class="material-symbols-outlined">schedule</span>
        <span>Coming soon</span>
      </div>
    </button>
  </section>
</div>
