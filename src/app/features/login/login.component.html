<div class="login-shell">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-text">
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="hint">Use your corporate account to access dashboards.</p>

    <form (ngSubmit)="submit()" #f="ngForm" class="form">
      <div class="form-group">
        <label>Email</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          required
          placeholder="gm@ercopac.com"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn" type="submit" [disabled]="f.invalid">
        Login
      </button>
    </form>

    <p class="message" [class.ok]="msg.includes('✅')" *ngIf="msg">{{ msg }}</p>

    <div class="footer">
      <span>v1 (PFE)</span>
    </div>
  </div>
</div>
